name: CI — Tests

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───────────────────────────────────────────
  # Backend — pytest (Django + SQLite)
  # ───────────────────────────────────────────
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq pkg-config default-libmysqlclient-dev

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        run: python manage.py migrate --no-input

      - name: Run pytest
        run: pytest -v --tb=short

  # ───────────────────────────────────────────
  # Frontend — Jest unit & component tests
  # ───────────────────────────────────────────
  frontend-unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Run Jest tests
        run: npm test -- --ci --forceExit

  # ───────────────────────────────────────────
  # Frontend — Playwright E2E tests (sharded)
  # ───────────────────────────────────────────
  frontend-e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 18
    strategy:
      fail-fast: false
      matrix:
        shard: ["1/5", "2/5", "3/5", "4/5", "5/5"]
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Install Playwright browsers with system deps
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests (shard ${{ matrix.shard }})
        run: npx playwright test --shard=${{ matrix.shard }} --reporter=blob
        env:
          CI: 'true'

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-blob-${{ strategy.job-index }}
          path: frontend/blob-report/
          retention-days: 1

      - name: Upload test traces (failures only)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-${{ strategy.job-index }}
          path: frontend/test-results/
          retention-days: 7

